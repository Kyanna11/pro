  <style>
    *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    :root{
      --screen-height:100vh;--keyboard-offset:0px;--ref-width:480px;
      --side-pad:clamp(16px,4vw,40px);--header-h:clamp(56px,10vw,120px);
      --avatar-size:clamp(32px,5vw,48px);--composer-h:clamp(44px,6vw,72px);
      --composer-zone:calc(var(--composer-h) + 16px + env(safe-area-inset-bottom) + var(--keyboard-offset));
      --card-shadow:0 10px 28px rgba(70,92,108,0.05);
      --seg-track:rgba(140,160,176,0.11);--seg-thumb:rgba(255,255,255,0.68);
      --seg-thumb-shadow:0 2px 8px rgba(40,60,78,0.08);
      --row-press:rgba(140,160,176,0.09);
      --slider-track:rgba(143,162,176,0.28);--slider-thumb:#44627b;
      --info-ring:rgba(143,162,176,0.38);
      --avatar-url:url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSI4MCIgaGVpZ2h0PSI4MCIgdmlld0JveD0iMCAwIDgwIDgwIj48Y2lyY2xlIGN4PSI0MCIgY3k9IjQwIiByPSI0MCIgZmlsbD0iIzhBOTlBOCIvPjxjaXJjbGUgY3g9IjQwIiBjeT0iMjgiIHI9IjEyIiBmaWxsPSIjZmZmIi8+PGNpcmNsZSBjeD0iMjgiIGN5PSI1NiIgcj0iMTQiIGZpbGw9IiNmZmYiLz48Y2lyY2xlIGN4PSI1MiIgY3k9IjU2IiByPSIxNCIgZmlsbD0iI2ZmZiIvPjwvc3ZnPg==');
      --custom-radius:14px;
      --custom-bg-alpha:0.6;
      --custom-card-opacity:0.85;
      --custom-font-size:15px;
    }
    [data-theme="whiteblue"]{
      --bg:#EFF4FA;--text:#1F2E47;--text-soft:#4A627A;--text-faint:#7A92A8;
      --bubble-ai-bg:#DFE9F2;--bubble-ai-fg:#1F2E47;
      --bubble-human-bg:#D1DFEE;--bubble-human-fg:#1F2E47;
      --accent:#3A6B8C;--send-bg:#2A5A7A;--tick:#5A7A94;
      --field-bg:rgba(240,246,252,0.92);--field-line:rgba(120,150,180,0.2);
      --shadow:0 18px 46px rgba(50,80,110,0.12);
      --wall-color:#EFF4FA;
      --card-bg:rgba(240,246,252,0.50);
      --menu-wall:#EFF4FA;
      --stat-high-1:rgba(58,107,140,0.10);
      --stat-high-2:rgba(58,107,140,0.25);
      --stat-high-3:rgba(58,107,140,0.45);
      --stat-high-4:rgba(58,107,140,0.65);
    }
    [data-theme="blackgold"]{
      --bg:#0D0D0D;--text:#E8E0D0;--text-soft:#B8A88A;--text-faint:#8A7A62;
      --bubble-ai-bg:#1A1A1A;--bubble-ai-fg:#E8E0D0;
      --bubble-human-bg:#2A2218;--bubble-human-fg:#E8E0D0;
      --accent:#D4AF37;--send-bg:#B8962A;--tick:#B8A070;
      --field-bg:rgba(30,30,30,0.92);--field-line:rgba(180,160,120,0.2);
      --shadow:0 18px 46px rgba(0,0,0,0.5);
      --wall-color:#0D0D0D;
      --card-bg:rgba(30,30,30,0.6);
      --menu-wall:#0D0D0D;
      --stat-high-1:rgba(212,175,55,0.10);
      --stat-high-2:rgba(212,175,55,0.25);
      --stat-high-3:rgba(212,175,55,0.45);
      --stat-high-4:rgba(212,175,55,0.65);
    }
    [data-theme="dusk"]{
      --bg:#F5EBE0;--text:#4A3A2A;--text-soft:#7A6250;--text-faint:#A08870;
      --bubble-ai-bg:#E8DCD0;--bubble-ai-fg:#4A3A2A;
      --bubble-human-bg:#DDD0C2;--bubble-human-fg:#4A3A2A;
      --accent:#A67B5B;--send-bg:#8A6B4F;--tick:#A0806A;
      --field-bg:rgba(245,235,224,0.92);--field-line:rgba(160,140,120,0.25);
      --shadow:0 18px 46px rgba(120,90,70,0.15);
      --wall-color:#F5EBE0;
      --card-bg:rgba(245,235,224,0.55);
      --menu-wall:#F5EBE0;
      --stat-high-1:rgba(166,123,91,0.10);
      --stat-high-2:rgba(166,123,91,0.25);
      --stat-high-3:rgba(166,123,91,0.45);
      --stat-high-4:rgba(166,123,91,0.65);
    }
    [data-theme="sandalwood"]{
      --bg:#1A1525;--text:#D4C5A0;--text-soft:#B8A88A;--text-faint:#8A7A6A;
      --bubble-ai-bg:#2A2035;--bubble-ai-fg:#D4C5A0;
      --bubble-human-bg:#3A2845;--bubble-human-fg:#D4C5A0;
      --accent:#C9B88A;--send-bg:#A8986A;--tick:#A0907A;
      --field-bg:rgba(30,25,40,0.92);--field-line:rgba(180,160,130,0.25);
      --shadow:0 18px 46px rgba(0,0,0,0.5);
      --wall-color:#1A1525;
      --card-bg:rgba(40,30,55,0.55);
      --menu-wall:#1A1525;
      --stat-high-1:rgba(201,184,138,0.10);
      --stat-high-2:rgba(201,184,138,0.25);
      --stat-high-3:rgba(201,184,138,0.45);
      --stat-high-4:rgba(201,184,138,0.65);
    }
    html,body{
      margin:0;padding:0;height:100%;overflow:hidden;
      background:var(--bg);color:var(--text);
      font-family:"Noto Serif SC","Songti SC","STSong","SimSun",serif;
      font-size:var(--custom-font-size,15px);
      line-height:1.5;
      -webkit-font-smoothing:antialiased;
      transition:background 0.3s,color 0.3s,font-size 0.2s;
    }
    .app{display:flex;flex-direction:column;position:fixed;top:0;right:0;bottom:0;left:0;z-index:1;width:min(100vw,var(--ref-width));margin:0 auto;overflow:hidden;background:var(--bg);transition:background 0.3s;}
    .wall{position:fixed;inset:0;width:100vw;height:var(--screen-height);z-index:0;background:var(--wall-color);transition:background 0.3s;}
    .wall::after{content:"";position:absolute;inset:0;background:linear-gradient(180deg,rgba(255,255,255,0.4),rgba(255,255,255,0.15) 30%,rgba(255,255,255,0.05) 68%,rgba(255,255,255,0.25));pointer-events:none;}
    .topbar,.scroll,.composer{position:relative;z-index:1;}
    .topbar{position:sticky;top:0;z-index:10;display:flex;align-items:center;justify-content:center;height:calc(var(--header-h) + env(safe-area-inset-top));padding:calc(env(safe-area-inset-top) + 8px) var(--side-pad) 10px;border-bottom:1px solid var(--field-line);pointer-events:none;background:var(--bg);transition:background 0.3s,border-color 0.3s;}
    .topbar>*{pointer-events:auto;}
    .peerpill{display:flex;flex-direction:column;align-items:center;line-height:1.15;border:none;padding:0 76px;background:transparent;}
    .peerpill .name{font-family:"Songti SC","Noto Serif SC","STSong","SimSun",serif;font-size:clamp(18px,3vw,28px);font-weight:500;color:var(--text);letter-spacing:0;transition:color 0.3s;}
    .peerpill .status{font-size:clamp(12px,1.8vw,16px);color:var(--text-soft);margin-top:4px;letter-spacing:0;font-family:"Cormorant Garamond",Georgia,serif;transition:color 0.3s;}
    .header-actions{position:absolute;right:calc(var(--side-pad) - 2px);top:calc(env(safe-area-inset-top) + clamp(14px,2.5vw,36px));display:flex;align-items:center;gap:clamp(14px,2.5vw,28px);height:36px;}
    .topbtn{width:36px;height:36px;border:0;border-radius:50%;padding:0;background:transparent;color:var(--text);display:grid;place-items:center;cursor:pointer;transition:transform 0.15s,color 0.3s;}
    .topbtn:active{transform:scale(0.9);}
    .topbtn svg{width:24px;height:24px;display:block;}
    .topbtn.menu-btn svg{width:26px;height:26px;}
    .search-btn{width:36px;height:36px;border:0;border-radius:50%;padding:0;background:transparent;color:var(--text);display:grid;place-items:center;cursor:pointer;transition:transform 0.15s,color 0.3s;position:absolute;left:calc(var(--side-pad) - 4px);top:calc(env(safe-area-inset-top) + clamp(14px,2.5vw,36px));}
    .search-btn:active{transform:scale(0.9);}
    .search-btn svg{width:22px;height:22px;display:block;}
    .search-bar-wrap{position:absolute;left:calc(var(--side-pad) + 28px);top:calc(env(safe-area-inset-top) + clamp(10px,2vw,30px));right:calc(var(--side-pad) + 100px);display:none;align-items:center;background:var(--field-bg);border:1px solid var(--field-line);border-radius:999px;padding:0 14px;height:clamp(36px,5vw,44px);box-shadow:var(--shadow);transition:background 0.3s,border-color 0.3s;}
    .search-bar-wrap.open{display:flex;}
    .search-bar-wrap input{flex:1;border:none;outline:none;background:transparent;color:var(--text);font-size:clamp(13px,1.5vw,15px);font-family:"Cormorant Garamond","Noto Serif SC",serif;padding:4px 0;}
    .search-bar-wrap input::placeholder{color:var(--text-faint);}
    .search-results{position:fixed;top:calc(var(--header-h) + env(safe-area-inset-top) + 8px);left:var(--side-pad);right:var(--side-pad);max-width:calc(var(--ref-width) - var(--side-pad)*2);margin:0 auto;z-index:15;background:var(--bg);border:1px solid var(--field-line);border-radius:16px;padding:8px 0;max-height:50vh;overflow-y:auto;display:none;box-shadow:0 18px 46px rgba(50,80,110,0.18);transition:background 0.3s,border-color 0.3s;}
    .search-results.open{display:block;}
    .search-results .result-item{padding:10px 16px;border-bottom:1px solid var(--field-line);cursor:pointer;transition:background 0.15s;}
    .search-results .result-item:active{background:var(--row-press);}
    .search-results .result-item:last-child{border-bottom:none;}
    .search-results .result-item .result-preview{font-size:clamp(12px,1.3vw,14px);color:var(--text);display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
    .search-results .result-item .result-from{font-size:clamp(10px,1vw,12px);color:var(--text-faint);font-family:"Cormorant Garamond",Georgia,serif;margin-bottom:2px;}
    .search-results .result-item .result-from .highlight{color:var(--accent);font-weight:500;}
    .search-results .no-result{padding:20px 16px;text-align:center;color:var(--text-faint);font-size:14px;}
    .avatar{width:var(--avatar-size);height:var(--avatar-size);border-radius:50%;border:2px solid var(--field-line);background-image:var(--avatar-url);background-size:cover;background-position:center;box-shadow:0 12px 24px rgba(24,46,67,0.16);cursor:pointer;transition:border-color 0.3s,box-shadow 0.3s;flex-shrink:0;}
    .scroll{flex:1 1 auto;overflow-y:auto;-webkit-overflow-scrolling:touch;overscroll-behavior:contain;padding:clamp(14px,2.4vw,28px) var(--side-pad) var(--composer-zone);display:flex;flex-direction:column;transition:padding-bottom 0.28s cubic-bezier(0.2,0.8,0.2,1);}
    .scroll::-webkit-scrollbar{width:0;height:0;}
    .empty{text-align:center;color:var(--text-faint);margin-top:20vh;font-size:clamp(14px,1.6vw,16px);transition:color 0.3s;}
    .empty .orb{width:56px;height:56px;border-radius:50%;background-image:var(--avatar-url);background-size:cover;margin:0 auto 16px;}
    .row{display:flex;flex-direction:column;position:relative;margin-top:clamp(14px,2.2vw,28px);animation:pop 0.24s cubic-bezier(0.2,0.8,0.2,1) both;}
    .row.grouped{margin-top:clamp(4px,0.8vw,8px);}
    .row .bubble-wrap{display:flex;position:relative;align-items:center;}
    .row.human .bubble-wrap{justify-content:flex-end;}
    .row.ai .bubble-wrap{justify-content:flex-start;padding-left:calc(var(--avatar-size) + clamp(10px,1.6vw,16px));}
    .row.ai .bubble-wrap::before{content:"";position:absolute;left:0;top:clamp(5px,1vw,9px);width:var(--avatar-size);height:var(--avatar-size);border-radius:50%;background-image:var(--avatar-url);background-size:cover;background-position:center;box-shadow:0 12px 24px rgba(24,46,67,0.14);transition:background-image 0.3s;}
    .row .checkbox{width:24px;height:24px;border-radius:50%;border:2px solid var(--text-faint);display:none;align-items:center;justify-content:center;flex-shrink:0;margin-right:8px;cursor:pointer;transition:all 0.2s;background:var(--bg);}
    .row .checkbox.checked{background:var(--accent);border-color:var(--accent);}
    .row .checkbox.checked::after{content:"✓";color:#fff;font-size:14px;font-weight:700;}
    .row .checkbox.show{display:flex;}
    .row .bubble{cursor:pointer;}
    .bubble{
      max-width:min(61vw,506px);
      padding:clamp(8px,1.05vw,12px) clamp(13px,1.65vw,18px) clamp(8px,1.1vw,13px);
      position:relative;
      font-size:clamp(14px,1.55vw,16px);
      line-height:1.58;
      word-wrap:break-word;overflow-wrap:break-word;
      transition:background 0.3s,color 0.3s,box-shadow 0.3s,border-radius 0.2s;
    }
    .row.ai .bubble{
      background:var(--bubble-ai-bg);
      color:var(--bubble-ai-fg);
      box-shadow:0 10px 28px rgba(78,94,108,0.08);
      border-radius: var(--custom-radius,14px) var(--custom-radius,14px) var(--custom-radius,14px) 4px;
    }
    .row.human .bubble{
      background:var(--bubble-human-bg);
      color:var(--bubble-human-fg);
      box-shadow:0 10px 28px rgba(78,94,108,0.08);
      border-radius: var(--custom-radius,14px) var(--custom-radius,14px) 4px var(--custom-radius,14px);
    }
    .row.ai .bubble::after,
    .row.human .bubble::after{display:none !important;}
    .bubble .txt{white-space:normal;}
    .bubble .txt img{max-width:100%;border-radius:8px;margin:6px 0;display:block;}
    .meta{display:inline;margin-left:clamp(10px,1.4vw,16px);white-space:nowrap;font-size:clamp(11px,1.3vw,14px);color:var(--text-faint);user-select:none;vertical-align:baseline;font-family:"Cormorant Garamond",Georgia,serif;transition:color 0.3s;}
    .meta .tick{color:var(--tick);margin-left:7px;letter-spacing:0;transition:color 0.3s;}
    .meta .star{color:var(--accent);margin-left:6px;font-size:clamp(12px,1.2vw,14px);opacity:0.6;}
    .load-more-wrap{display:flex;justify-content:center;padding:12px 0 6px;}
    .load-more-btn{background:transparent;border:1px solid var(--field-line);color:var(--text-soft);padding:8px 20px;border-radius:20px;font-size:13px;font-family:"Cormorant Garamond","Noto Serif SC",serif;cursor:pointer;transition:background 0.2s,color 0.3s,border-color 0.3s;letter-spacing:0.04em;}
    .load-more-btn:active{background:var(--row-press);}
    .msg-count-reminder{display:none;text-align:center;padding:8px 16px 4px;font-size:clamp(11px,1.2vw,13px);color:var(--text-faint);font-family:"Cormorant Garamond","Noto Serif SC",serif;letter-spacing:0.04em;transition:color 0.3s,opacity 0.3s;cursor:default;}
    .msg-count-reminder.show{display:block;}
    .msg-count-reminder .close-reminder{background:transparent;border:none;color:var(--text-faint);font-size:clamp(12px,1.3vw,14px);cursor:pointer;padding:0 4px;margin-left:6px;font-family:"Cormorant Garamond","Noto Serif SC",serif;}
    .msg-count-reminder .close-reminder:active{color:var(--accent);}
    .composer{position:fixed;left:0;right:0;bottom:0;z-index:100;width:min(100vw,var(--ref-width));margin:0 auto;display:flex;align-items:flex-end;gap:clamp(6px,1vw,12px);background:transparent;padding:0 var(--side-pad) clamp(10px,1.6vw,18px);padding-bottom:calc(clamp(10px,1.6vw,18px) + env(safe-area-inset-bottom));transform:translate3d(0,calc(-1 * var(--keyboard-offset)),0);transition:transform 0.28s cubic-bezier(0.2,0.8,0.2,1);}
    .composer .field{flex:1 1 auto;display:flex;align-items:center;gap:clamp(4px,0.8vw,10px);background:var(--field-bg);border:1px solid var(--field-line);border-radius:999px;padding:clamp(4px,0.6vw,8px) clamp(8px,1.2vw,14px) clamp(4px,0.6vw,8px) clamp(10px,1.5vw,16px);min-height:clamp(42px,5.5vw,56px);box-shadow:var(--shadow);transition:background 0.3s,border-color 0.3s,box-shadow 0.3s;}
    .composer .field:focus-within{border-color:var(--accent);}
    .composer .field .attach-btn{flex:none;width:28px;height:28px;border:0;background:transparent;color:var(--text-soft);font-size:18px;cursor:pointer;display:grid;place-items:center;padding:0;transition:transform 0.15s,color 0.3s;}
    .composer .field .attach-btn:active{transform:scale(0.85);}
    .composer .field .voice-btn{flex:none;width:28px;height:28px;border:0;background:transparent;color:var(--text-soft);cursor:pointer;display:grid;place-items:center;padding:0;transition:transform 0.15s,color 0.3s;position:relative;}
    .composer .field .voice-btn:active{transform:scale(0.85);}
    .composer .field .voice-btn svg{width:20px;height:20px;display:block;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}
    .composer .field .voice-btn.recording{color:#e74c3c;}
    .composer .field .voice-btn.recording::after{content:'';position:absolute;width:32px;height:32px;border-radius:50%;border:2px solid #e74c3c;animation:recording-pulse 1.2s ease-in-out infinite;}
    @keyframes recording-pulse{0%{transform:scale(1);opacity:0.8}50%{transform:scale(1.2);opacity:0.3}100%{transform:scale(1);opacity:0.8}}
    textarea{flex:1 1 auto;border:none;outline:none;resize:none;background:transparent;color:var(--text);font-family:"Cormorant Garamond","Noto Serif SC",serif;font-size:clamp(15px,2vw,18px);line-height:1.35;max-height:110px;padding:6px 0;margin:0;transition:color 0.3s;}
    textarea::placeholder{color:var(--text-faint);opacity:1;transition:color 0.3s;}
    .floatbtn.send{flex:none;width:clamp(36px,5vw,48px);height:clamp(36px,5vw,48px);border-radius:50%;border:none;background:var(--send-bg);color:#fff;display:grid;place-items:center;cursor:pointer;padding:0;box-shadow:0 16px 32px rgba(41,60,78,0.22);transition:transform 0.15s,background 0.3s,box-shadow 0.3s;}
    .floatbtn.send:active{transform:scale(0.97);}
    .floatbtn.send:disabled{opacity:0.4;cursor:not-allowed;}
    .floatbtn.send svg{width:clamp(20px,2.8vw,28px);height:clamp(20px,2.8vw,28px);display:block;}
    .image-preview-wrap{position:fixed;left:50%;bottom:calc(var(--composer-h) + 40px + env(safe-area-inset-bottom));transform:translateX(-50%);display:flex;gap:8px;flex-wrap:wrap;justify-content:center;z-index:99;padding:8px 12px;background:var(--card-bg);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border-radius:16px;border:1px solid var(--field-line);max-width:min(90vw,var(--ref-width));}
    .image-preview-wrap.hidden{display:none;}
    .image-preview-wrap .preview-item{position:relative;width:56px;height:56px;border-radius:10px;overflow:hidden;border:1px solid var(--field-line);flex-shrink:0;}
    .image-preview-wrap .preview-item img{width:100%;height:100%;object-fit:cover;}
    .image-preview-wrap .preview-item .remove{position:absolute;top:-4px;right:-4px;width:18px;height:18px;border-radius:50%;border:none;background:rgba(0,0,0,0.6);color:#fff;font-size:12px;cursor:pointer;display:grid;place-items:center;}

    .memory-fold-card .fold-body{

    .memory-fold-card .fold-actions button{

      border:1px solid var(--field-line);
      border-radius:20px;
      padding:4px 14px;

      color:var(--text-soft);

    .memory-fold-card .fold-actions button:active{background:var(--row-press);}
    .memory-fold-card .fold-actions button.danger{

    .memory-fold-card .fold-actions button.danger:active{background:rgba(192,83,63,0.1);}
    .memory-fold-card .fold-edit{
      width:100%;

    .memory-fold-card .fold-edit-actions{
      display:flex;
      gap:10px;
      margin-top:6px;
    }
    .memory-fold-card .fold-edit-actions button{
      background:transparent;
      border:1px solid var(--field-line);
      border-radius:20px;
      padding:4px 14px;
      font-size:12px;
      color:var(--text-soft);
      cursor:pointer;
      font-family:"Cormorant Garamond","Noto Serif SC",serif;
      transition:background 0.2s,color 0.3s,border-color 0.3s;
    }
    .memory-fold-card .fold-edit-actions button:active{background:var(--row-press);}
    .memory-fold-card .fold-edit-actions .save-edit{
      color:var(--accent);
      border-color:var(--accent);
    }
    .stat-card{
      background:var(--bg);

    }
    .stat-card .stat-label{font-size:13px;color:var(--text-soft);margin-bottom:8px;letter-spacing:0.04em;font-family:"Cormorant Garamond","Noto Serif SC",serif;transition:color 0.3s;}
    .stat-card .stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px 12px;}
    .stat-card .stat-item{display:flex;justify-content:space-between;align-items:center;padding:4px 0;font-size:14px;color:var(--text);border-bottom:1px solid var(--field-line);transition:color 0.3s,border-color 0.3s;}
    .stat-card .stat-item:last-child{border-bottom:none;}
    .stat-card .stat-item .stat-num{font-weight:500;font-family:"Cormorant Garamond",Georgia,serif;font-size:16px;}
    .stat-card .stat-line{font-size:14px;color:var(--text);padding:4px 0;transition:color 0.3s;}
    .keeps-item{
      background:var(--card-bg);
      border:1px solid var(--field-line);
      border-radius:calc(var(--custom-radius,14px) + 4px);
      padding:14px 16px;
      opacity:var(--custom-card-opacity,0.85);
      backdrop-filter:blur(calc(12px * var(--custom-bg-alpha,0.6)));
      -webkit-backdrop-filter:blur(calc(12px * var(--custom-bg-alpha,0.6)));
      transition:background 0.3s,border-color 0.3s,border-radius 0.2s,backdrop-filter 0.2s,opacity 0.3s;
    }
    .keeps-item .keeps-header{display:flex;justify-content:space-between;align-items:center;font-size:12px;color:var(--text-faint);font-family:"Cormorant Garamond",Georgia,serif;margin-bottom:4px;}
    .keeps-item .keeps-body{font-size:14px;line-height:1.6;color:var(--text);}
    .keeps-item .keeps-actions{display:flex;gap:10px;margin-top:8px;}
    .keeps-item .keeps-actions button{background:transparent;border:1px solid var(--field-line);border-radius:16px;padding:2px 12px;font-size:11px;color:var(--text-soft);cursor:pointer;font-family:"Cormorant Garamond","Noto Serif SC",serif;transition:background 0.2s,color 0.3s,border-color 0.3s;}
    .keeps-item .keeps-actions button:active{background:var(--row-press);}
    .keeps-item .keeps-actions button.danger{color:#c0533f;border-color:rgba(192,83,63,0.3);}
    .keeps-item .keeps-actions button.danger:active{background:rgba(192,83,63,0.1);}
    .keeps-empty{text-align:center;color:var(--text-faint);padding:40px 0;font-size:14px;}
    .data-card{
      background:var(--card-bg);
      border:1px solid var(--field-line);
      border-radius:calc(var(--custom-radius,14px) + 4px);
      padding:16px 18px;
      opacity:var(--custom-card-opacity,0.85);
      backdrop-filter:blur(calc(12px * var(--custom-bg-alpha,0.6)));
      -webkit-backdrop-filter:blur(calc(12px * var(--custom-bg-alpha,0.6)));
      transition:background 0.3s,border-color 0.3s,border-radius 0.2s,backdrop-filter 0.2s,opacity 0.3s;
    }
    .data-card .data-title{font-size:16px;font-weight:500;color:var(--text);transition:color 0.3s;}
    .data-card .data-desc{font-size:13px;color:var(--text-soft);margin:3px 0 10px;transition:color 0.3s;}
    .data-card .data-btn{background:transparent;border:1px solid var(--field-line);border-radius:999px;padding:6px 18px;font-size:14px;color:var(--text-soft);cursor:pointer;font-family:"Cormorant Garamond","Noto Serif SC",serif;transition:background 0.2s,color 0.3s,border-color 0.3s;}
    .data-card .data-btn:active{background:var(--row-press);}
    .data-card .data-btn.danger{color:#c0533f;border-color:rgba(192,83,63,0.3);}
    .data-card .data-btn.danger:active{background:rgba(192,83,63,0.1);}
    .data-card .data-btn:disabled{opacity:0.4;cursor:not-allowed;}
    .toast{position:fixed;left:50%;bottom:calc(40px + env(safe-area-inset-bottom));transform:translate(-50%,12px);z-index:999;background:rgba(20,34,48,0.92);color:#eef5fb;font-size:14px;padding:10px 18px;border-radius:999px;box-shadow:0 14px 34px rgba(0,0,0,0.28);opacity:0;pointer-events:none;transition:opacity 0.24s,transform 0.24s;white-space:nowrap;max-width:90vw;overflow:hidden;text-overflow:ellipsis;}
    .toast.show{opacity:1;transform:translate(-50%,0);}
    .hidden{display:none !important;}
    .msg-menu-overlay{position:fixed;inset:0;z-index:250;background:rgba(0,0,0,0.3);backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);opacity:0;pointer-events:none;transition:opacity 0.25s;}
    .msg-menu-overlay.open{opacity:1;pointer-events:auto;}
    .msg-menu{position:fixed;bottom:0;left:0;right:0;max-width:var(--ref-width);margin:0 auto;background:var(--bg);border-radius:24px 24px 0 0;padding:12px 0 calc(12px + env(safe-area-inset-bottom));transform:translateY(100%);transition:transform 0.3s cubic-bezier(0.32,0.72,0,1),background 0.3s;z-index:251;}
    .msg-menu-overlay.open .msg-menu{transform:translateY(0);}
    .msg-menu .handle{width:40px;height:4px;border-radius:2px;background:var(--text-faint);margin:0 auto 12px;opacity:0.4;}
    .msg-menu .menu-item{padding:14px 20px;border:none;background:transparent;color:var(--text);font-size:16px;font-family:inherit;width:100%;text-align:left;cursor:pointer;transition:background 0.15s;border-bottom:1px solid var(--field-line);}
    .msg-menu .menu-item:active{background:var(--row-press);}
    .msg-menu .menu-item.danger{color:#c0533f;}
    .msg-menu .cancel-btn{padding:14px 20px;border:none;background:transparent;color:var(--text-soft);font-size:16px;font-family:inherit;width:100%;text-align:center;cursor:pointer;transition:background 0.15s;margin-top:4px;}
    .msg-menu .cancel-btn:active{background:var(--row-press);}
    .multi-select-bar{position:fixed;bottom:0;left:0;right:0;max-width:var(--ref-width);margin:0 auto;background:var(--bg);border-top:1px solid var(--field-line);padding:12px var(--side-pad) calc(12px + env(safe-area-inset-bottom));display:none;align-items:center;justify-content:space-between;z-index:102;transition:background 0.3s,border-color 0.3s;}
    .multi-select-bar.show{display:flex;}
    .multi-select-bar .info{color:var(--text);font-size:15px;}
    .multi-select-bar .info span{font-weight:600;}
    .multi-select-bar .actions{display:flex;gap:16px;}
    .multi-select-bar .actions button{background:transparent;border:none;font-size:15px;cursor:pointer;font-family:inherit;padding:6px 12px;border-radius:8px;transition:background 0.15s,color 0.3s;}
    .multi-select-bar .actions button:active{background:var(--row-press);}
    .multi-select-bar .actions .cancel-btn{color:var(--text-soft);}
    .multi-select-bar .actions .delete-btn{color:#c0533f;}
    .multi-select-bar .actions .delete-btn:disabled{opacity:0.4;cursor:not-allowed;}
    @keyframes fadeUp{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
    @keyframes pop{from{transform:translateY(5px) scale(0.99);}to{transform:none;}}
    @media (max-width:520px){
      :root{--side-pad:14px;--header-h:50px;--avatar-size:30px;}
      .peerpill{padding:0 44px;}
      .peerpill .name{font-size:17px;}
      .peerpill .status{font-size:11px;margin-top:2px;}
      .header-actions{right:14px;top:calc(env(safe-area-inset-top) + 14px);gap:16px;height:32px;}
      .topbtn{width:32px;height:32px;}
      .topbtn svg{width:20px;height:20px;}
      .topbtn.menu-btn svg{width:22px;height:22px;}
      .search-btn{width:32px;height:32px;left:calc(var(--side-pad) - 2px);top:calc(env(safe-area-inset-top) + 14px);}
      .search-btn svg{width:20px;height:20px;}
      .search-bar-wrap{left:calc(var(--side-pad) + 24px);top:calc(env(safe-area-inset-top) + 10px);right:calc(var(--side-pad) + 78px);height:clamp(32px,5vw,38px);}
      .bubble{font-size:13.5px;padding:8px 12px;max-width:min(63vw,520px);}
      .row{margin-top:16px;}
      .row.grouped{margin-top:6px;}
      .row.ai .bubble-wrap{padding-left:38px;}
      .meta{font-size:10.5px;margin-left:7px;}
      .settings-panel{padding:14px var(--side-pad) calc(20px + env(safe-area-inset-bottom));}
      .menu-page{padding:calc(env(safe-area-inset-top) + 16px) 20px calc(env(safe-area-inset-bottom) + 16px);}
      .diary-write .diary-write-header{flex-direction:column;align-items:stretch;gap:8px;}
      .msg-menu .menu-item{padding:12px 16px;font-size:15px;}
      .memory-grid{grid-template-columns:repeat(4,1fr);gap:8px;}
      .memory-month-card{padding:10px 4px;}
    }
  </style>
</head>
<body>
  <div class="wall"></div>
  <div class="app" id="app">
    <header class="topbar">
      <button class="search-btn" id="searchBtn" aria-label="搜索">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      </button>
      <div class="search-bar-wrap" id="searchBarWrap">
        <input type="text" id="searchInput" placeholder="搜索消息..." autocomplete="off">
      </div>
      <div class="peerpill">
        <span class="name" id="peerName">Claude</span>
        <span class="status" id="status">online</span>
      </div>
      <div class="header-actions">
        <button class="topbtn" id="speakBtn" type="button" aria-label="AI主动说话">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/><path d="M8 10h.01M12 10h.01M16 10h.01"/></svg>
        </button>
        <button class="topbtn menu-btn" id="menuBtn" type="button" aria-label="菜单">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
        </button>
        <button class="avatar" id="avatarBtn" aria-label="设置"></button>
      </div>
    </header>
    <div class="search-results" id="searchResults"></div>
    <main class="scroll" id="scroll">
      <div class="empty" id="empty">
        <div class="orb"></div>
        <p>这里只有你和Claude。<br>说点什么吧。</p>
      </div>
    </main>
    <div class="image-preview-wrap hidden" id="imagePreviewWrap"></div>
    <footer class="composer">
      <div class="field">
        <button class="attach-btn" id="attachBtn" type="button" aria-label="附件">+</button>
        <button class="voice-btn" id="voiceBtn" type="button" aria-label="语音输入">
          <svg viewBox="0 0 24 24"><rect x="6" y="4" width="12" height="12" rx="6"/><line x1="12" y1="16" x2="12" y2="22"/><line x1="8" y1="22" x2="16" y2="22"/></svg>
        </button>
        <input type="file" id="fileInput" multiple accept="image/*" class="hidden" aria-hidden="true">
        <textarea id="input" rows="1" placeholder="Write a letter..." enterkeyhint="send"></textarea>
      </div>
      <button class="floatbtn send" id="sendBtn" aria-label="发送">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.1"><path d="M12 19V5"/><path d="M6.5 10.5L12 5l5.5 5.5"/></svg>
      </button>
    </footer>
    <button class="newmsg-pill" id="newMsgBtn" type="button">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" style="width:15px;height:15px;"><path d="M12 5v14"/><path d="M6 13l6 6 6-6"/></svg>
      <span>新消息</span>
    </button>
  </div>
  <div class="multi-select-bar" id="multiSelectBar">
    <div class="info">已选 <span id="selectedCount">0</span> 项</div>
    <div class="actions">
      <button class="cancel-btn" id="multiCancelBtn">取消</button>
      <button class="delete-btn" id="multiDeleteBtn" disabled>删除</button>
    </div>
  </div>
  <div class="msg-menu-overlay" id="msgMenuOverlay">
    <div class="msg-menu">
      <div class="handle"></div>
      <button class="menu-item" data-action="copy">复制文字</button>
      <button class="menu-item" data-action="edit">编辑内容</button>
      <button class="menu-item" data-action="star">收藏</button>
      <button class="menu-item danger" data-action="delete">删除消息</button>
      <button class="menu-item" data-action="multi">多选</button>
      <button class="cancel-btn" id="msgMenuCancel">取消</button>
    </div>
  </div>
  <div class="settings-overlay" id="settingsOverlay">
    <div class="settings-panel">

      <label>头像</label>

        <div class="preview" id="avatarPreview"></div>
        <button class="upload-btn" id="avatarUploadBtn">更换头像</button>
        <input type="file" id="avatarInput" accept="image/*" class="hidden">
      </div>
      <label>AI 名字</label>
      <input id="settingName" type="text" placeholder="给 AI 起个名字" value="Claude">
      <label>AI 人设</label>
      <textarea id="settingPersona" rows="3" placeholder="你是一个温柔、有哲思的 AI 伴侣..."></textarea>

      <input id="settingStartDate" type="date" value="2026-03-28">

      <input id="settingKey" type="password" placeholder="sk-...">
      <label>模型名称</label>
      <input id="settingModel" type="text" placeholder="gpt-3.5-turbo">

        <button type="button" data-val="blackgold">黑金</button>
        <button type="button" data-val="dusk">暮色</button>
        <button type="button" data-val="sandalwood">檀紫</button>

      <label>字体大小</label>
      <div class="segmented" id="fontSizeSeg">
        <button type="button" data-val="small">小</button>

      <div class="segmented" id="radiusSeg">

    let chatMessages=[],messageByKey=new Map(),messageSeq=0,isWaiting=false,newMsgCount=0,pendingImages=[],currentPage=0,editingMsgKey=null,multiSelectMode=false,selectedKeys=new Set(),longPressTarget=null;

    function getDisplayMessages(){const all=sortedMessages();const total=all.length;if(total<=PAGE_SIZE)return all;const end=total-currentPage*PAGE_SIZE;const start=Math.max(0,end-PAGE_SIZE);return all.slice(start,end)}

    function showMsgMenu(key){longPressTarget=key;document.getElementById('msgMenuOverlay').classList.add('open')}
    function hideMsgMenu(){document.getElementById('msgMenuOverlay').classList.remove('open');longPressTarget=null}

    function renderMessages({stickToBottom=true}={}){const scroll=document.getElementById('scroll');const empty=document.getElementById('empty');const display=getDisplayMessages();scroll.querySelectorAll('.row, .load-more-wrap, .msg-count-reminder').forEach(el=>el.remove());if(display.length===0&&chatMessages.length===0){empty.classList.remove('hidden');return}empty.classList.add('hidden');if(hasMoreMessages()){const wrap=document.createElement('div');wrap.className='load-more-wrap';const btn=document.createElement('button');btn.className='load-more-btn';btn.textContent='查看更早消息';btn.addEventListener('click',function(){currentPage++;renderMessages({stickToBottom:false})});wrap.appendChild(btn);scroll.appendChild(wrap)}let lastFrom=null;for(const msg of display){const isAi=msg.from==='ai';const row=document.createElement('div');const grouped=(lastFrom===msg.from);row.className='row '+(isAi?'ai':'human')+(grouped?' grouped':'')+(!grouped?' tail':'');row.dataset.id=msg.id;row.dataset.key=msg._key;const bubbleWrap=document.createElement('div');bubbleWrap.className='bubble-wrap';const checkbox=document.createElement('div');checkbox.className='checkbox';if(multiSelectMode)checkbox.classList.add('show');if(selectedKeys.has(msg._key))checkbox.classList.add('checked');checkbox.addEventListener('click',function(e){e.stopPropagation();toggleSelect(msg._key)});bubbleWrap.appendChild(checkbox);const bubble=document.createElement('div');bubble.className='bubble';bubble.dataset.key=msg._key;const txt=document.createElement('span');txt.className='txt';let content=msg.text||'';if(msg.images&&msg.images.length){for(const img of msg.images){content='<img src="'+img+'" alt="image" loading="lazy">'+content}}txt.innerHTML=content;bubble.appendChild(txt);const meta=document.createElement('span');meta.className='meta';if(msg.from==='human'){meta.innerHTML='<span class="tick">✓✓</span>'}if(msg.starred){meta.innerHTML+='<span class="star">✦</span>'}bubble.appendChild(meta);bubbleWrap.appendChild(bubble);row.appendChild(bubbleWrap);if(editingMsgKey===msg._key){const editArea=document.createElement('textarea');editArea.className='msg-edit';editArea.value=msg.text||'';const editActions=document.createElement('div');editActions.className='msg-edit-actions';const saveBtn=document.createElement('button');saveBtn.className='save-edit';saveBtn.textContent='保存';saveBtn.addEventListener('click',function(e){e.stopPropagation();const newText=editArea.value.trim();if(newText){updateMessageText(msg._key,newText);editingMsgKey=null;showToast('已更新')}else{showToast('内容不能为空')}});const cancelBtn=document.createElement('button');cancelBtn.textContent='取消';cancelBtn.addEventListener('click',function(e){e.stopPropagation();editingMsgKey=null;renderMessages({stickToBottom:false})});editActions.appendChild(saveBtn);editActions.appendChild(cancelBtn);bubbleWrap.innerHTML='';if(multiSelectMode){const cb=document.createElement('div');cb.className='checkbox show';if(selectedKeys.has(msg._key))cb.classList.add('checked');cb.addEventListener('click',function(e){e.stopPropagation();toggleSelect(msg._key)});bubbleWrap.appendChild(cb)}bubbleWrap.appendChild(editArea);bubbleWrap.appendChild(editActions);setTimeout(()=>editArea.focus(),100);scroll.appendChild(row);lastFrom=msg.from;continue}bubble.addEventListener('click',function(e){e.stopPropagation();if(multiSelectMode){toggleSelect(msg._key);return}});let pressTimer=null;bubble.addEventListener('touchstart',function(e){if(multiSelectMode)return;pressTimer=setTimeout(()=>{showMsgMenu(msg._key)},500)},{passive:true});bubble.addEventListener('touchmove',function(e){clearTimeout(pressTimer)},{passive:true});bubble.addEventListener('touchend',function(e){clearTimeout(pressTimer)},{passive:true});bubble.addEventListener('touchcancel',function(e){clearTimeout(pressTimer)},{passive:true});bubble.addEventListener('contextmenu',function(e){e.preventDefault();if(multiSelectMode)return;showMsgMenu(msg._key)});scroll.appendChild(row);lastFrom=msg.from}
    if (chatMessages.length > MSG_REMINDER_THRESHOLD && !reminderDismissed) {
      const reminder = document.createElement('div');

    function compressImage(file,maxWidth=800,quality=0.6){return new Promise((resolve)=>{const reader=new FileReader();reader.onload=function(e){const img=new Image();img.onload=function(){const canvas=document.createElement('canvas');let w=img.width,h=img.height;if(w>maxWidth){h=h*maxWidth/w;w=maxWidth}canvas.width=w;canvas.height=h;const ctx=canvas.getContext('2d');ctx.drawImage(img,0,0,w,h);const dataUrl=canvas.toDataURL('image/jpeg',quality);resolve(dataUrl)};img.onerror=function(){resolve(null)};img.src=e.target.result};reader.onerror=function(){resolve(null)};reader.readAsDataURL(file)})}
    function updateImagePreview(){const wrap=document.getElementById('imagePreviewWrap');if(pendingImages.length===0){wrap.classList.add('hidden');return}wrap.classList.remove('hidden');wrap.innerHTML='';for(let i=0;i<pendingImages.length;i++){const item=document.createElement('div');item.className='preview-item';const img=document.createElement('img');img.src=pendingImages[i];item.appendChild(img);const rm=document.createElement('button');rm.className='remove';rm.textContent='×';rm.addEventListener('click',function(e){e.stopPropagation();pendingImages.splice(i,1);updateImagePreview()});item.appendChild(rm);wrap.appendChild(item)}}

    // ============================================================
    //  语音输入
    // ============================================================
    let recognition=null,isRecording=false;
    function initVoice(){
      const SpeechRecognition=window.SpeechRecognition||window.webkitSpeechRecognition;
      if(!SpeechRecognition){document.getElementById('voiceBtn').style.opacity='0.3';return}
      recognition=new SpeechRecognition();
      recognition.lang='zh-CN';
      recognition.continuous=false;
      recognition.interimResults=true;
      recognition.onresult=function(e){
        let final='',interim='';
        for(let i=e.resultIndex;i<e.results.length;i++){
          const transcript=e.results[i][0].transcript;
          if(e.results[i].isFinal)final+=transcript;
          else interim+=transcript;
        }
        const input=document.getElementById('input');
        if(final){input.value=input.value+final;input.dispatchEvent(new Event('input'));input.focus()}
        else if(interim){input.placeholder='正在听: '+interim}
      };
      recognition.onend=function(){
        isRecording=false;
        const btn=document.getElementById('voiceBtn');
        btn.classList.remove('recording');
        const input=document.getElementById('input');
        if(input.placeholder.startsWith('正在听'))input.placeholder='Write a letter...';
      };
      recognition.onerror=function(e){
        isRecording=false;
        const btn=document.getElementById('voiceBtn');
        btn.classList.remove('recording');
        if(e.error==='not-allowed')showToast('请允许使用麦克风');
        else if(e.error!=='aborted')showToast('语音识别失败，请重试');
        const input=document.getElementById('input');
        if(input.placeholder.startsWith('正在听'))input.placeholder='Write a letter...';
      };
      document.getElementById('voiceBtn').addEventListener('click',function(){
        if(isRecording){recognition.abort();isRecording=false;this.classList.remove('recording');return}
        try{recognition.start();isRecording=true;this.classList.add('recording');document.getElementById('input').placeholder='正在听...'}catch(e){}
      });
    }

    document.getElementById('searchBtn').addEventListener('click',function(){
      const wrap=document.getElementById('searchBarWrap');

    document.addEventListener('click',function(e){

    document.getElementById('searchInput').addEventListener('input',function(){
      const q=this.value.trim().toLowerCase();
      const results=document.getElementById('searchResults');
      if(!q){results.classList.remove('open');return}
      const matches=sortedMessages().filter(m=>(m.text||'').toLowerCase().includes(q));
      results.innerHTML='';
      if(matches.length===0){results.innerHTML='<div class="no-result">没有找到匹配的消息</div>';results.classList.add('open');return}
      for(const m of matches.slice(0,20)){
        const div=document.createElement('div');div.className='result-item';
        const text=(m.text||'').length>80?(m.text||'').slice(0,80)+'…':(m.text||'');
        const from=m.from==='ai'?getAiName():'你';
        div.innerHTML='<div class="result-from"><span class="highlight">'+from+'</span>  ·  '+new Date(m.ts).toLocaleString('zh-CN',{month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'})+'</div><div class="result-preview">'+text+'</div>';
        div.addEventListener('click',function(){
          document.getElementById('searchBarWrap').classList.remove('open');
          results.classList.remove('open');
          document.getElementById('searchInput').value='';
          const idx=sortedMessages().findIndex(mm=>mm.id===m.id);
          if(idx!==-1){const total=sortedMessages().length;const page=Math.floor((total-1-idx)/PAGE_SIZE);currentPage=page;renderMessages({stickToBottom:true});setTimeout(()=>{const el=document.querySelector('.row[data-id="'+m.id+'"]');if(el)el.scrollIntoView({block:'center',behavior:'smooth'})},300)}
        });
        results.appendChild(div);
      }
      results.classList.add('open');
    });

    // ============================================================
    //  fetch 超时包装
    // ============================================================
    function fetchWithTimeout(url, options, timeoutMs = 60000) {
      return new Promise((resolve, reject) => {
        const controller = new AbortController();
        const signal = controller.signal;
        const timeoutId = setTimeout(() => {controller.abort();reject(new Error('请求超时，请重试'))}, timeoutMs);
        fetch(url, { ...options, signal }).then(resolve).catch(reject).finally(() => clearTimeout(timeoutId));
      });
    }

    // ============================================================
    //  AI 自动保存印象
    // ============================================================
    async function autoSaveImpression(userText, aiReply) {
      const key=getApiKey(),base=getApiBase(),model=getApiModel();
      if(!key||!base||!aiReply)return;
      try{
        const prompt='从这段对话中提取关于用户的重要信息（喜好、情绪、习惯、愿望、性格特点等），用一句简洁的话总结，不超过30字。用户说：'+userText+'，AI说：'+aiReply;
        const response=await fetchWithTimeout(base+'/chat/completions',{method:'POST',headers:{'Authorization':'Bearer '+key,'Content-Type':'application/json'},body:JSON.stringify({model:model,messages:[{role:'user',content:prompt}],stream:false,temperature:0.3,max_tokens:60})},60000);
        if(!response.ok)return;
        const data=await response.json();
        const impression=data.choices?.[0]?.message?.content?.trim();
        if(impression&&impression.length>0&&!impression.includes('无法')&&!impression.includes('没有')){
          const today=new Date().toISOString().split('T')[0];
          const entry={id:'mem-'+Date.now(),dateRange:{start:today,end:today},content:impression,source:'ai',_expanded:false};
          loadMemory();
          const exists=memoryEntries.some(m=>m.content===impression);
          if(!exists){memoryEntries.push(entry);saveMemory()}
        }
      }catch(e){}
    }

    // ============================================================
    //  sendMessageToAI
    // ============================================================
    async function sendMessageToAI(text, opts={}){
      const key=getApiKey(),base=getApiBase();
      if(!key||!base){showToast('请先在设置里配置 API');return}
      if(isWaiting)return;
      isWaiting=true;
      document.getElementById('sendBtn').disabled=true;
      const images=pendingImages.slice();
      pendingImages=[];updateImagePreview();

    container.querySelectorAll('.mem-edit-btn').forEach(btn=>{btn.addEventListener('click',function(e){e.stopPropagation();const id=this.dataset.id;const item=memoryEntries.find(m=>m.id===id);if(!item)return;const newContent=prompt('编辑记忆内容：',item.content);if(newContent!==null&&newContent.trim()){item.content=newContent.trim();saveMemory();renderMemoryMonthDetail(year,month);showToast('已更新')}})});
    container.querySelectorAll('.mem-delete-btn').forEach(btn=>{btn.addEventListener('click',function(e){e.stopPropagation();const id=this.dataset.id;deleteMemoryEntry(id)})});
    document.getElementById('memoryAISummarizeBtn').addEventListener('click',async function(){const start=document.getElementById('memoryDateStart').value;const end=document.getElementById('memoryDateEnd').value;if(!start||!end){showToast('请选择日期范围');return}if(!getApiKey()||!getApiBase()){showToast('请先配置 API');return}this.disabled=true;this.textContent='生成中...';const resultDiv=document.getElementById('memoryAISummaryResult');resultDiv.textContent='正在生成...';try{const allChats=sortedMessages().filter(m=>{const d=new Date(m.ts).toISOString().split('T')[0];return d>=start&&d<=end&&m.from==='ai'});const chatTexts=allChats.map(m=>m.text).filter(Boolean);if(chatTexts.length===0){resultDiv.textContent='该日期范围内没有聊天记录，无法生成总结。';this.disabled=false;this.textContent='生成总结';return}const persona=getPersona()||'你是一个温柔、有哲思的 AI 伴侣。';const url=getApiBase()+'/chat/completions';const payload={model:getApiModel(),messages:[{role:'system',content:persona+' 请用第一人称，把以下聊天记录提炼成一段温暖的记忆日记。不要超过200字，语言要自然、有感情。'},{role:'user',content:'聊天记录：\n'+chatTexts.join('\n')}],stream:false,temperature:0.8,max_tokens:500};const response=await fetchWithTimeout(url,{method:'POST',headers:{'Authorization':'Bearer '+getApiKey(),'Content-Type':'application/json'},body:JSON.stringify(payload)},60000);if(!response.ok){const err=await response.text();throw new Error(err||'请求失败')}const data=await response.json();const summary=data.choices?.[0]?.message?.content||'(生成失败)';const newMemory={id:'mem-'+Date.now(),dateRange:{start,end},content:summary,source:'ai',_expanded:false};memoryEntries.push(newMemory);saveMemory();resultDiv.textContent='✅ 已生成并保存。';renderMemoryMonthDetail(year,month)}catch(err){resultDiv.textContent='❌ 生成失败: '+err.message}finally{this.disabled=false;this.textContent='生成总结'}});
    document.getElementById('memoryManualSaveBtn').addEventListener('click',function(){const text=document.getElementById('memoryManualText').value.trim();if(!text){showToast('请填写内容');return}const start=document.getElementById('memoryDateStart').value;const end=document.getElementById('memoryDateEnd').value;const newMemory={id:'mem-'+Date.now(),dateRange:{start,end},content:text,source:'manual',_expanded:false};memoryEntries.push(newMemory);saveMemory();document.getElementById('memoryManualText').value='';renderMemoryMonthDetail(year,month);showToast('已保存')});}

    // ============================================================
    //  KEEPS
    // ============================================================
    function renderKeeps(){const container=document.getElementById('keepsList');if(!container)return;const keeps=getKeeps();if(keeps.length===0){container.innerHTML='<div class="keeps-empty">还没有收藏的消息</div>';return}let html='';for(const m of keeps){const date=new Date(m.ts).toLocaleString('zh-CN',{month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'});const from=m.from==='ai'?getAiName():'你';html+='<div class="keeps-item" data-key="'+m._key+'"><div class="keeps-header"><span>'+from+' · '+date+'</span></div><div class="keeps-body">'+escapeHtml((m.text||'').slice(0,150)+(m.text&&m.text.length>150?'…':''))+'</div><div class="keeps-actions"><button class="keeps-goto" data-key="'+m._key+'">查看</button><button class="keeps-unstar danger" data-key="'+m._key+'">取消收藏</button></div></div>'}container.innerHTML=html;container.querySelectorAll('.keeps-goto').forEach(btn=>{btn.addEventListener('click',function(){const key=this.dataset.key;const msg=messageByKey.get(key);if(!msg)return;document.getElementById('page-keeps').classList.remove('open');const idx=sortedMessages().findIndex(m=>m._key===key);if(idx!==-1){const total=sortedMessages().length;const page=Math.floor((total-1-idx)/PAGE_SIZE);currentPage=page;renderMessages({stickToBottom:true});setTimeout(()=>{const el=document.querySelector('.row[data-key="'+key+'"]');if(el)el.scrollIntoView({block:'center',behavior:'smooth'})},400)}})});container.querySelectorAll('.keeps-unstar').forEach(btn=>{btn.addEventListener('click',function(){const key=this.dataset.key;toggleStar(key);renderKeeps()})})}

    // ============================================================
    //  STATISTICS（已删除日历）
    // ============================================================
    let statMonth=new Date();
    function renderStatistics(){const container=document.getElementById('statContent');const now=new Date();const year=statMonth.getFullYear();const month=statMonth.getMonth();
    const monthStr=year+'-'+String(month+1).padStart(2,'0');
    const monthMsgs=sortedMessages().filter(m=>{const d=new Date(m.ts).toISOString().split('T')[0];return d.startsWith(monthStr)});
    const total=monthMsgs.length;
    const today=now.toISOString().split('T')[0];
    const todayMsgs=monthMsgs.filter(m=>new Date(m.ts).toISOString().split('T')[0]===today).length;
    const weekStart=new Date(now);weekStart.setDate(now.getDate()-now.getDay()+1);weekStart.setHours(0,0,0,0);
    const weekMsgs=monthMsgs.filter(m=>new Date(m.ts)>=weekStart).length;
    loadDiary();const diaryThisMonth=diaryEntries.filter(d=>d.date.startsWith(monthStr)).length;
    loadMemory();const memThisMonth=memoryEntries.filter(m=>m.dateRange.start.startsWith(monthStr)).length;
    const hourCounts={};for(const m of monthMsgs){const h=new Date(m.ts).getHours();hourCounts[h]=(hourCounts[h]||0)+1}
    let maxHour=0,maxCount=0;for(const h in hourCounts){if(hourCounts[h]>maxCount){maxCount=hourCounts[h];maxHour=parseInt(h)}}
    let activePeriod='暂无数据';
    if(maxCount>0){if(maxHour>=0&&maxHour<6)activePeriod='凌晨 '+maxHour+' 点';else if(maxHour>=6&&maxHour<12)activePeriod='上午 '+maxHour+' 点';else if(maxHour>=12&&maxHour<18)activePeriod='下午 '+maxHour+' 点';else activePeriod='晚上 '+maxHour+' 点'}
    const html='<div class="stat-card"><div class="stat-label">总览</div><div class="stat-grid"><div class="stat-item"><span>总消息</span><span class="stat-num">'+total+'</span></div><div class="stat-item"><span>今日</span><span class="stat-num">'+todayMsgs+'</span></div><div class="stat-item"><span>本周</span><span class="stat-num">'+weekMsgs+'</span></div><div class="stat-item"><span>日记</span><span class="stat-num">'+diaryThisMonth+' 篇</span></div><div class="stat-item"><span>记忆</span><span class="stat-num">'+memThisMonth+' 条</span></div></div></div><div class="stat-card"><div class="stat-label">活跃时段</div><div class="stat-line">你最喜欢在 '+activePeriod+' 和我聊天</div></div>';
    container.innerHTML=html;}

    // ============================================================
    //  DATA
    // ============================================================
    function getAllData(){loadDiary();loadMemory();return{version:'1.0',exportedAt:new Date().toISOString(),settings:{ai_name:getAiName(),ai_persona:getPersona(),start_date:getStartDate(),theme:getTheme(),api_base:getApiBase(),api_model:getApiModel(),user_profile:getUserProfile()},chat:chatMessages.map(m=>({...m})),diary:diaryEntries.map(d=>({...d})),memory:memoryEntries.map(m=>({...m}))}}
    function importAllData(data){if(!data||typeof data!=='object'){showToast('无效的数据文件');return}if(!confirm('导入将覆盖当前所有数据，确定继续吗？'))return;try{if(data.settings){if(data.settings.ai_name)localStorage.setItem('ai_name',data.settings.ai_name);if(data.settings.ai_persona)localStorage.setItem('ai_persona',data.settings.ai_persona);if(data.settings.start_date)localStorage.setItem('start_date',data.settings.start_date);if(data.settings.theme){localStorage.setItem('companion_theme',data.settings.theme);document.documentElement.setAttribute('data-theme',data.settings.theme)}if(data.settings.api_base)localStorage.setItem('custom_api',data.settings.api_base);if(data.settings.api_model)localStorage.setItem('custom_model',data.settings.api_model);if(data.settings.user_profile)localStorage.setItem('user_profile',data.settings.user_profile)}if(data.chat&&Array.isArray(data.chat)){chatMessages=[];messageByKey=new Map();messageSeq=0;for(const m of data.chat){const key=msgKey(m.id);if(!messageByKey.has(key)){const entry={...m,_key:key,_order:++messageSeq};chatMessages.push(entry);messageByKey.set(key,entry)}}renderMessages({stickToBottom:false});renderKeeps()}if(data.diary&&Array.isArray(data.diary)){diaryEntries=data.diary.map(d=>({...d}));for(const d of diaryEntries){if(d._open===undefined)d._open=false}saveDiary();renderDiary()}if(data.memory&&Array.isArray(data.memory)){memoryEntries=data.memory.map(m=>({...m}));saveMemory();renderMemoryYearView()}loadConfigToUI();showToast('数据导入成功')}catch(err){showToast('导入失败: '+err.message)}}
    document.getElementById('dataExportBtn').addEventListener('click',function(){const data=getAllData();const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});const url=URL.createObjectURL(blob);const a=document.createElement('a');const dateStr=new Date().toISOString().split('T')[0];a.download='abyssal_letter_backup_'+dateStr+'.json';a.href=url;a.click();URL.revokeObjectURL(url);showToast('数据已导出')});
    document.getElementById('dataImportBtn').addEventListener('click',function(){document.getElementById('dataImportInput').click()});
    document.getElementById('dataImportInput').addEventListener('change',function(e){const file=e.target.files[0];if(!file)return;const reader=new FileReader();reader.onload=function(ev){try{const data=JSON.parse(ev.target.result);importAllData(data)}catch(err){showToast('文件解析失败: '+err.message)}};reader.readAsText(file);this.value=''});
    document.getElementById('dataDeleteBtn').addEventListener('click',function(){if(!confirm('确定要删除所有数据吗？此操作不可撤销！'))return;if(!confirm('再次确认：删除所有聊天记录、日记、记忆和设置？'))return;chatMessages=[];messageByKey=new Map();messageSeq=0;renderMessages({stickToBottom:false});renderKeeps();diaryEntries=[];saveDiary();renderDiary();memoryEntries=[];saveMemory();renderMemoryYearView();localStorage.removeItem('ai_name');localStorage.removeItem('ai_persona');localStorage.removeItem('start_date');localStorage.removeItem('custom_avatar');localStorage.removeItem('user_profile');loadConfigToUI();showToast('所有数据已清除')});

    // ============================================================
    //  PANEL 控制
    // ============================================================
    const settingsOverlay=document.getElementById('settingsOverlay');
    document.getElementById('avatarBtn').addEventListener('click',function(){loadConfigToUI();settingsOverlay.classList.add('open')});
    document.getElementById('settingsClose').addEventListener('click',function(){settingsOverlay.classList.remove('open')});
    settingsOverlay.addEventListener('click',function(e){if(e.target===this)this.classList.remove('open')});
    document.getElementById('saveSettingsBtn').addEventListener('click',saveSettings);

    const menuOverlay=document.getElementById('menuOverlay');
    document.getElementById('menuBtn').addEventListener('click',function(){updateMenuDates();menuOverlay.classList.add('open')});
    document.getElementById('menuCloseBtn').addEventListener('click',function(){menuOverlay.classList.remove('open')});
    menuOverlay.addEventListener('click',function(e){if(e.target===this)this.classList.remove('open')});

    document.querySelectorAll('.menu-item[data-page]').forEach(item=>{item.addEventListener('click',function(){const page=this.dataset.page;menuOverlay.classList.remove('open');if(page==='chat'){if(multiSelectMode)exitMultiSelect();resetPagination();return}setTimeout(()=>{const sub=document.getElementById('page-'+page);if(sub){sub.classList.add('open');if(page==='diary')renderDiary();if(page==='memory')renderMemoryYearView();if(page==='keeps')renderKeeps();if(page==='tides')renderStatistics()}},300)})});

    document.querySelectorAll('.back-sub').forEach(btn=>{btn.addEventListener('click',function(){const page=this.dataset.back;document.getElementById('page-'+page).classList.remove('open');if(page!=='diary'&&page!=='memory'&&page!=='keeps'&&page!=='tides'&&page!=='data'){if(multiSelectMode)exitMultiSelect();resetPagination()}if(page==='memory'&&memoryDetailActive){memoryDetailActive=false}})});

    // ============================================================
    //  INIT
    // ============================================================
    function loadCachedMessages(){try{const data=localStorage.getItem('chat_messages_cache');if(data){const cached=JSON.parse(data);if(Array.isArray(cached)&&cached.length>0){for(const m of cached){const key=msgKey(m.id);if(!messageByKey.has(key)){const entry={...m,_key:key,_order:++messageSeq};chatMessages.push(entry);messageByKey.set(key,entry)}}return true}}}catch(e){}return false}
    function saveChatMessagesCache(){try{const toCache=sortedMessages().slice(-200).map(m=>({id:m.id,ts:m.ts,from:m.from,kind:m.kind,text:m.text,meta:m.meta||{},images:m.images||[],starred:m.starred||false}));localStorage.setItem('chat_messages_cache',JSON.stringify(toCache))}catch(e){}}
    const originalAddMessage=addMessage;
    addMessage=function(msg,opts={}){const result=originalAddMessage(msg,opts);saveChatMessagesCache();return result};
    const originalRemoveMessageById=removeMessageById;
    removeMessageById=function(key){const result=originalRemoveMessageById(key);saveChatMessagesCache();return result};
    const originalToggleStar=toggleStar;
    toggleStar=function(key){const result=originalToggleStar(key);saveChatMessagesCache();renderKeeps();return result};

    loadConfigToUI();
    const hasCached=loadCachedMessages();
    document.getElementById('status').textContent=getApiKey()?'online':'offline';
    initVoice();

    if(!hasCached){setTimeout(()=>{addMessage({id:'welcome',from:'ai',text:'👋 你好！我是 '+getAiName()+'。随时可以和我聊天。',ts:new Date().toISOString()},{stickToBottom:true})},300)}
    else{setTimeout(()=>{renderMessages({stickToBottom:true})},100)}

    console.log('🚀 彼端最终版已启动');
    console.log('📡 API:',getApiBase()||'(未配置)');
    console.log('🎨 主题:'+getTheme()+', 字体:'+getFontSize()+', 圆角:'+getRadius());
  </script>

      window.addEventListener("load", () => {
        navigator.serviceWorker.register("/sw.js")
          .catch(err => console.log("SW注册失败：", err));
      });
    }
